services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: missed_work_reminder
      DB_USERNAME: laraveluser
      DB_PASSWORD: laravelpass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - missed-work-network
    command: >
      sh -c "until php artisan migrate --force 2>/dev/null; do
        echo 'Waiting for database...';
        sleep 3;
      done &&
      php artisan db:seed --class=UserSeeder --force &&
      php artisan db:seed --class=AttendanceSeeder --force &&
      php artisan serve --host=0.0.0.0 --port=8000"

  queue:
    build: .
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: missed_work_reminder
      DB_USERNAME: laraveluser
      DB_PASSWORD: laravelpass
    depends_on:
      app:
        condition: service_started
    networks:
      - missed-work-network
    command: >
      sh -c "sleep 30 &&
      php artisan queue:work --tries=3 --sleep=5"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: missed_work_reminder
      MYSQL_USER: laraveluser
      MYSQL_PASSWORD: laravelpass
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    networks:
      - missed-work-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  missed-work-network:
    driver: bridge
